<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Terminal window frame -->
  <rect x="72" y="100" width="368" height="280" rx="16" ry="16" fill="#0f172a" opacity="0.85"/>
  <!-- Terminal title bar -->
  <rect x="72" y="100" width="368" height="36" rx="16" ry="16" fill="#1e293b"/>
  <rect x="72" y="120" width="368" height="16" fill="#1e293b"/>
  <!-- Title bar dots -->
  <circle cx="100" cy="118" r="6" fill="#ef4444" opacity="0.9"/>
  <circle cx="120" cy="118" r="6" fill="#eab308" opacity="0.9"/>
  <circle cx="140" cy="118" r="6" fill="#22c55e" opacity="0.9"/>
  <!-- Prompt line 1: chevron + text -->
  <text x="96" y="172" font-family="monospace" font-size="24" font-weight="bold" fill="#22c55e">$</text>
  <rect x="120" y="158" width="140" height="18" rx="3" fill="url(#glow)" opacity="0.6"/>
  <!-- Prompt line 2: agent output -->
  <text x="96" y="212" font-family="monospace" font-size="24" font-weight="bold" fill="#6366f1">></text>
  <rect x="120" y="198" width="200" height="18" rx="3" fill="#6366f1" opacity="0.35"/>
  <!-- Prompt line 3 -->
  <text x="96" y="252" font-family="monospace" font-size="24" font-weight="bold" fill="#6366f1">></text>
  <rect x="120" y="238" width="160" height="18" rx="3" fill="#6366f1" opacity="0.25"/>
  <!-- Cursor blink -->
  <rect x="96" y="274" width="12" height="20" rx="2" fill="#a5b4fc" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- AI sparkle icon (top right of terminal) -->
  <g transform="translate(388, 102)">
    <!-- Star/sparkle shape -->
    <path d="M24 4 L28 16 L40 20 L28 24 L24 36 L20 24 L8 20 L20 16 Z" fill="#fbbf24" opacity="0.95"/>
    <path d="M10 6 L12 10 L16 12 L12 14 L10 18 L8 14 L4 12 L8 10 Z" fill="#fbbf24" opacity="0.7"/>
  </g>
  <!-- Bottom text: AGENV -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="8" fill="white" opacity="0.95">AGENV</text>
</svg>
